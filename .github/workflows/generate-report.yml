name: レッスンレポート生成

on:
  schedule:
    - cron: '42 11 * * *'   # 毎日20時42分JST（UTC 11:42 = JST 20:42）
  workflow_dispatch:         # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # git push に必要

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 依存パッケージをインストール
        run: npm ci

      - name: Tailwind CSS ビルド
        run: npm run build:css

      - name: 日本語フォントをインストール
        run: |
          sudo apt-get install -y fonts-noto-cjk
          sudo fc-cache -fv

      - name: Playwright（Chromium）をインストール
        run: npx playwright install chromium --with-deps

      - name: 今日の既存PNGを削除（毎回新しく生成するため）
        run: |
          DATE=$(TZ=Asia/Tokyo date +'%Y-%m-%d')
          rm -f output/${DATE}-*.png output/${DATE}.png
          echo "output/${DATE}*.png を削除しました（存在した場合）"

      - name: レポート生成（Notion取得 → HTML → PNG）
        run: node src/main.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

      - name: PNG をコミット & プッシュ
        id: push
        run: |
          DATE=$(TZ=Asia/Tokyo date +'%Y-%m-%d')
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

          # PNGファイルが存在しない場合はスキップ（本日のレッスン記録なし）
          if ! ls output/*.png 1>/dev/null 2>&1; then
            echo "PNG ファイルが存在しません。本日のレッスン記録がないためスキップします。"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.png
          if git diff --cached --quiet; then
            echo "変更なし（内容が同じ）"
          else
            git commit -m "レポート生成 ${DATE}"
            git push
          fi
          echo "has_png=true" >> "$GITHUB_OUTPUT"

      - name: LINE に画像を送信（PNG が生成されていれば常に送信）
        if: steps.push.outputs.has_png == 'true'
        run: |
          DATE="${{ steps.push.outputs.date }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://raw.githubusercontent.com/${REPO}/main/output"
          # 今日の日付に一致する PNG ファイルを全件収集して URL リストを生成
          URLS=$(ls output/${DATE}-*.png output/${DATE}.png 2>/dev/null | \
            sed "s|output/|${BASE_URL}/|g" | \
            jq -R . | jq -sc .)
          node -e "
            const { sendLine } = require('./src/send-line');
            const urls = ${URLS};
            sendLine(urls)
              .then(() => process.exit(0))
              .catch(e => { console.error(e); process.exit(1); });
          "
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
